     1|     1|name: "🐛 Bug Report"
     2|     2|description: Report a bug — something that's broken, crashes, or behaves incorrectly.
     3|     3|title: "[Bug]: "
     4|     4|labels: ["bug"]
     5|     5|body:
     6|     6|  - type: markdown
     7|     7|    attributes:
     8|     8|      value: |
     9|     9|        Thanks for reporting a bug! Please fill out the sections below so we can reproduce and fix it quickly.
    10|    10|
    11|    11|        **Before submitting**, please:
    12|    12|        - [ ] Search [existing issues](https://github.com/NousResearch/hermes-agent/issues) to avoid duplicates
    13|    13|        - [ ] Update to the latest version (`hermes update`) and confirm the bug still exists
    14|    14|        - [ ] Run `hermes debug share` and paste the links below (see Debug Report section)
    15|    15|
    16|    16|  - type: textarea
    17|    17|    id: description
    18|    18|    attributes:
    19|    19|      label: Bug Description
    20|    20|      description: A clear description of what's broken. Include error messages, tracebacks, or screenshots if relevant.
    21|    21|      placeholder: |
    22|    22|        What happened? What did you expect to happen instead?
    23|    23|    validations:
    24|    24|      required: true
    25|    25|
    26|    26|  - type: textarea
    27|    27|    id: reproduction
    28|    28|    attributes:
    29|    29|      label: Steps to Reproduce
    30|    30|      description: Minimal steps to trigger the bug. The more specific, the faster we can fix it.
    31|    31|      placeholder: |
    32|    32|        1. Run `hermes chat`
    33|    33|        2. Send the message "..."
    34|    34|        3. Agent calls tool X
    35|    35|        4. Error appears: ...
    36|    36|    validations:
    37|    37|      required: true
    38|    38|
    39|    39|  - type: textarea
    40|    40|    id: expected
    41|    41|    attributes:
    42|    42|      label: Expected Behavior
    43|    43|      description: What should have happened instead?
    44|    44|    validations:
    45|    45|      required: true
    46|    46|
    47|    47|  - type: textarea
    48|    48|    id: actual
    49|    49|    attributes:
    50|    50|      label: Actual Behavior
    51|    51|      description: What actually happened? Include full error output if available.
    52|    52|    validations:
    53|    53|      required: true
    54|    54|
    55|    55|  - type: dropdown
    56|    56|    id: component
    57|    57|    attributes:
    58|    58|      label: Affected Component
    59|    59|      description: Which part of Hermes is affected?
    60|    60|      multiple: true
    61|    61|      options:
    62|    62|        - CLI (interactive chat)
    63|    63|        - Gateway (Telegram/Discord/Slack/WhatsApp)
    64|    64|        - Setup / Installation
    65|    65|        - Tools (terminal, file ops, web, code execution, etc.)
    66|    66|        - Skills (skill loading, skill hub, skill guard)
    67|    67|        - Agent Core (conversation loop, context compression, memory)
    68|    68|        - Configuration (config.yaml, .env, hermes setup)
    69|    69|        - Other
    70|    70|    validations:
    71|    71|      required: true
    72|    72|
    73|    73|  - type: dropdown
    74|    74|    id: platform
    75|    75|    attributes:
    76|    76|      label: Messaging Platform (if gateway-related)
    77|    77|      description: Which platform adapter is affected?
    78|    78|      multiple: true
    79|    79|      options:
    80|    80|        - N/A (CLI only)
    81|    81|        - Telegram
    82|    82|        - Discord
    83|    83|        - Slack
    84|    84|        - WhatsApp
    85|    85|
    86|    86|  - type: textarea
    87|    87|    id: debug-report
    88|    88|    attributes:
    89|    89|      label: Debug Report
    90|    90|      description: |
    91|    91|        Run `hermes debug share` from your terminal and paste the links it prints here.
    92|    92|        This uploads your system info, config, and recent logs to a paste service automatically.
    93|    93|
    94|    94|        If you're in an interactive chat session, you can also use the `/debug` slash command — it does the same thing.
    95|    95|
    96|    96|        If the upload fails, run `hermes debug share --local` and paste the output directly.
    97|    97|      placeholder: |
    98|    98|        Report   https://paste.rs/abc123
    99|    99|        agent.log   https://paste.rs/def456
   100|   100|        gateway.log   https://paste.rs/ghi789
   101|   101|      render: shell
   102|   102|    validations:
   103|   103|      required: true
   104|   104|
   105|   105|  - type: input
   106|   106|    id: os
   107|   107|    attributes:
   108|   108|      label: Operating System
   109|   109|      description: e.g. Ubuntu 24.04, macOS 15.2, Windows 11
   110|   110|      placeholder: Ubuntu 24.04
   111|   111|    validations:
   112|   112|      required: true
   113|   113|
   114|   114|  - type: input
   115|   115|    id: python-version
   116|   116|    attributes:
   117|   117|      label: Python Version
   118|   118|      description: Output of `python --version`
   119|   119|      placeholder: "3.11.9"
   120|   120|
   121|   121|  - type: input
   122|   122|    id: hermes-version
   123|   123|    attributes:
   124|   124|      label: Hermes Version
   125|   125|      description: Output of `hermes version`
   126|   126|      placeholder: "2.1.0"
   127|   127|
   128|   128|  - type: textarea
   129|   129|    id: logs
   130|   130|    attributes:
   131|   131|      label: Additional Logs / Traceback (optional)
   132|   132|      description: |
   133|   133|        The debug report above covers most logs. Use this field for any extra error output,
   134|   134|        tracebacks, or screenshots not captured by `hermes debug share`.
   135|   135|      render: shell
   136|   136|
   137|   137|  - type: textarea
   138|   138|    id: root-cause
   139|   139|    attributes:
   140|   140|      label: Root Cause Analysis (optional)
   141|   141|      description: |
   142|   142|        If you've dug into the code and identified the root cause, share it here.
   143|   143|        Include file paths, line numbers, and code snippets if possible. This massively speeds up fixes.
   144|   144|      placeholder: |
   145|   145|        The bug is in `gateway/run.py` line 949. `len(history)` counts session_meta entries
   146|   146|        but `agent_messages` was built from filtered history...
   147|   147|
   148|   148|  - type: textarea
   149|   149|    id: proposed-fix
   150|   150|    attributes:
   151|   151|      label: Proposed Fix (optional)
   152|   152|      description: If you have a fix in mind (or a PR ready), describe it here.
   153|   153|      placeholder: |
   154|   154|        Replace `.get()` with `.pop()` on line 289 of `gateway/platforms/base.py`
   155|   155|        to actually clear the pending message after retrieval.
   156|   156|
   157|   157|  - type: checkboxes
   158|   158|    id: pr-ready
   159|   159|    attributes:
   160|   160|      label: Are you willing to submit a PR for this?
   161|   161|      options:
   162|   162|        - label: I'd like to fix this myself and submit a PR
   163|   163|
   164|
